<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible form ui</title>

    <!-- meta tags -->
    <meta name="description" content="Accesssible form ui ">
    <meta name="keywords" content="website, HTML, CSS">
    <meta name="author" content="dev kumar">
     
    <!-- meta og tag -->
    <meta property="og:description" content="Accessible form ui website made with html and css">
    <meta property="og:title" content="Accesbile form ui">
    <meta property="og:image" content="">
    <meta property="og:url" content="">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="image/icons8-form-32.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container">
            <form class="form">
                <label for="name">Full name</label>
                <input 
                   type="text" 
                   name="name" 
                   id="name"  
                   placeholder="what should we call you?" 
                   required 
                   aria-required="true"
                   aria-invalid="false"
                   aria-describedby="name-error">
                <div id="name-error" class="error" aria-live="polite">Only alphabetic characters allowed</div>

                <label for="email">Email</label>
                <input 
                   type="email" 
                   name="email" 
                   id="email" 
                   placeholder="enter your email" 
                   required 
                   aria-required="true"
                    aria-invalid="false"
                    autocomplete="email"
                   aria-describedby="email-error">
                <div id="email-error" class="error" aria-live="polite">Email is already taken</div>
                
                <label for="password">Enter password</label>
                <div class="password-wrapper">
                    <input 
                       type="password" 
                       name="password" 
                       id="password"  
                       placeholder="Enter password"
                       required 
                       aria-required="true"
                        aria-invalid="false"
                        autocomplete="new-password"
                       aria-describedby="weak-password">
                    <button type="button" class="togglePassword" aria-label="Show password"><img src="view.png" alt=""></button>
                </div>
                <div id="weak-password" class="error" aria-live="polite">Password is too weak</div>

                <label for="confirm-password">Confirm password</label>
                <div class="password-wrapper">
                    <input 
                       type="password" 
                       name="confirm-password" 
                       id="confirm-password" 
                       placeholder="Enter password"
                       required 
                       aria-required="true"
                       aria-invalid="false"
                       aria-describedby="unmatch-password">
                    <button type="button" class="togglePassword" aria-label="Show password" aria-pressed="true"><img src="view.png" alt=""></button>
                </div>
                <div id="unmatch-password" class="error" aria-live="polite">Passwords do not match</div>

                <button type="submit" id="update-btn">Update Profile</button>
            </form>
            <div class="info">
                <div class="progress-circle">
                    <div class="circle">
                       <p class="progress-percentage">65%</p>
                    </div>
                    <h3>Profile Completeness</h3>
                </div>
                <div class="task">
                    <ul>
                        <li class="completed">Create Account</li>
                        <li class="completed">Update Roadmap Progress</li>
                        <li class="completed">Complete your first Project</li>
                        <li>Setup Public Profile</li>
                        <li>invite your friends</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
